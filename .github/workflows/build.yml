name: Build pywho
on:
  push:
    paths:
    - 'pywho.py'
  workflow_dispatch:

jobs:
  ubuntu-vm-build-job:
    name: Build for Ubuntu 20.04
    #runs-on: ubuntu-latest
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
      - name: Install packages, create venv, pip install, run Build  
        run: |
          DEBIAN_FRONTEND=noninteractive && \
          sudo apt-get install -y upx-ucl python3-pip python3-venv && \
          python3 -m venv venv && \
          . venv/bin/activate && \
          pip3 install --upgrade pip wheel setuptools && \
          pip3 install -r requirements.txt && \
          pip3 install pyinstaller sysv-ipc geoip2 && \
          ./build.sh
      - uses: actions/upload-artifact@v2
        with:
          name: artifact-build-ubuntu
          path: |
            *.tar.gz
            *.sha512sum
          if-no-files-found: error

  # Build for Debian
  debian-container-build-job:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - debian-release: buster
            python-version: 3.7
          - debian-release: bullseye
            python-version: 3.9
      fail-fast: false
    # container: debian:10
    container: python:${{ matrix.python-version }}-${{ matrix.debian-release }}
    steps:
      - uses: actions/checkout@v2
      - name: Install packages, create venv, pip install, run ${{ matrix.debian-release }} Build
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get update -y && \
          apt-get install -y upx-ucl && \
          python3 -m venv venv && \
          . venv/bin/activate && \
          pip3 install --upgrade pip wheel setuptools && \
          pip3 install -r requirements.txt && \
          pip3 install pyinstaller sysv-ipc geoip2 && \
          ./build.sh
      - uses: actions/upload-artifact@v2
        with:
          name: artifact-build-debian
          path: |
            *.tar.gz
            *.sha512sum
            
  centos7-container-build-job:
    name: Build for CentOS 7
    runs-on: ubuntu-latest
    container: centos:7
    steps:
      - uses: actions/checkout@v2
      - name: Install packages, create venv, pip install, run Build  
        run: |
          #yum groupinstall -y "Development Tools" && \
          yum install -y gcc python3-devel python3-pip python3-virtualenv && \
          rpm -i https://download-ib01.fedoraproject.org/pub/epel/7/x86_64/Packages/u/ucl-1.03-24.el7.x86_64.rpm && \
          rpm -i https://download-ib01.fedoraproject.org/pub/epel/7/x86_64/Packages/u/upx-3.96-9.el7.x86_64.rpm && \
          python3 -m venv venv && \
          . venv/bin/activate && \
          pip3 install --upgrade pip wheel setuptools && \
          pip3 install -r requirements.txt && \
          pip3 install pyinstaller sysv-ipc geoip2 && \
          ./build.sh
      - uses: actions/upload-artifact@v2
        with:
          name: artifact-build-centos
          path: |
            *.tar.gz
            *.sha512sum
